version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: ridekorea-db
    restart: always
    environment:
      POSTGRES_DB: ridekorea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
